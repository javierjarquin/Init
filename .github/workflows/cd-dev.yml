  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Wait for deploy propagation
        run: sleep 30

      - name: Check health endpoint
        run: |
          # Reemplaza con tu URL de health check
          # curl -f https://dev-api.tu-proyecto.com/health || exit 1
          echo "⚠️ Configura tu health check URL en este step"

      - name: Notify success
        if: success()
        run: echo "✅ Deploy a development exitoso"

      - name: Notify failure
        if: failure()
        run: echo "❌ Health check falló — revisar deploy"
