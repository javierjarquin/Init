# CD Production — Deploy a produccion al merge en main
#
# TEMPLATE: Reemplaza la seccion de deploy con tu proveedor real.
# Incluye verificacion obligatoria y rollback automatico.

name: CD Production

on:
  push:
    branches: [main]

concurrency:
  group: cd-prod
  cancel-in-progress: false  # NUNCA cancelar un deploy a produccion en progreso

env:
  NODE_VERSION: "20"
  ENVIRONMENT: production

jobs:
  pre-deploy-checks:
    name: Pre-deploy Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    environment: production  # Requiere aprobacion manual en GitHub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # =============================================
      # Reemplaza con tu deploy real (ver cd-dev.yml para opciones)
      # =============================================
      - name: Deploy (placeholder)
        run: echo "✅ Build exitoso. Reemplaza este step con tu deploy real."

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const tag = `v${new Date().toISOString().slice(0,10).replace(/-/g, '.')}`;
            const commits = execSync('git log --oneline -10').toString();
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: `## Changes\n\`\`\`\n${commits}\n\`\`\``,
              draft: false,
              prerelease: false
            });

  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Wait for deploy propagation
        run: sleep 60

      - name: Check health endpoint
        id: health
        run: |
          # Reemplaza con tu URL de health check de produccion
          # HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.tu-proyecto.com/health)
          # if [ "$HTTP_STATUS" != "200" ]; then
          #   echo "health_ok=false" >> $GITHUB_OUTPUT
          #   exit 1
          # fi
          # echo "health_ok=true" >> $GITHUB_OUTPUT
          echo "⚠️ Configura tu health check URL en este step"

      - name: Notify success
        if: success()
        run: echo "✅ Deploy a produccion exitoso — health check OK"

      # Rollback automatico si health check falla
      - name: Auto-rollback on failure
        if: failure()
        run: |
          echo "❌ Health check failed — initiating auto-rollback"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git revert HEAD --no-edit
          git push origin main
          echo "🔄 Auto-rollback complete — previous commit reverted"
          echo "⚠️ Review the failed deploy and fix before re-deploying"
